  <script type="importmap">

  <body>
    <!-- 
      MOCK WP SITE CONTENT 
      This represents your existing WordPress Theme (Pro.Radio)
    -->
    <div className="relative w-full min-h-screen bg-neutral-900">
      <div class="absolute inset-0 z-0 opacity-30 pointer-events-none" style="background-image: url('https://images.unsplash.com/photo-1598518619679-5847a279e025?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-position: center; filter: grayscale(100%) contrast(125%);"></div>
      
      <div class="relative z-10 p-10 flex flex-col items-center justify-center min-h-screen text-center">
        <h1 class="text-6xl md:text-8xl font-sans font-bold text-white tracking-tighter mb-4">RADIO VESÁNICO</h1>
        <p class="text-xl text-[#ff0055] font-mono uppercase tracking-widest bg-black px-4 py-1">Hemos perdido la cabeza, pero la perdimos por el Rock!</p>
        
        <div class="mt-8 p-4 bg-black/80 border border-gray-700 max-w-lg mx-auto text-left font-mono text-sm">
          <p class="text-[#ff0055] mb-2">> MODO PREVISUALIZACIÓN DE PLUGIN</p>
          <p class="text-gray-400">1. Descarga el archivo <code>vesanico-chat.php</code>.</p>
          <p class="text-gray-400">2. Descarga la carpeta <code>assets</code>.</p>
          <p class="text-gray-400">3. Comprime y sube a Plugins > Añadir Nuevo.</p>
        </div>
      </div>

      <!-- MOCK PLAYER -->
      <div class="fixed bottom-0 left-0 right-0 h-20 bg-[#1f1f1f] border-t border-[#333] z-40 flex items-center px-8 justify-between">
         <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-[#ff0055] animate-pulse"></div>
            <div>
              <div class="text-white font-bold font-sans tracking-wide">THE CURE</div>
              <div class="text-gray-400 text-xs font-mono">A Forest</div>
            </div>
         </div>
      </div>
    </div>

    <!-- WP FOOTER HOOK LOCATION -->
    <div id="vesanico-chat-root"></div>

    <!-- 
      SIMULATE WP_LOCALIZE_SCRIPT 
      This variables are normally injected by PHP. We mock them here for the preview to work.
    -->
    <script>
      var vesanicoVars = {
        ajaxUrl: 'https://jsonplaceholder.typicode.com/posts', // Mock URL for demo
        nonce: '123456',
        isAdmin: true // Change to false to test user view
      };

      // Mock jQuery AJAX for the demo environment so the UI works without a real WP Backend
      const originalAjax = $.ajax;
      $.ajax = function(options) {
        // Intercept GET comments
        if (options.data.action === 'vesanico_get_comments') {
             // Return fake data
             const fakeData = [
                 { id: 1, time: new Date().toISOString(), author: 'Sombra', avatar_seed: 'Sombra', content: '¡Larga vida al post-punk! Desde Chile.', is_admin: 0 },
                 { id: 2, time: new Date().toISOString(), author: 'Admin', avatar_seed: 'Admin', content: 'Bienvenidos al abismo.', is_admin: 1 }
             ];
             options.success({ success: true, data: fakeData });
             return;
        }
        // Intercept POST/DELETE
        if (options.data.action === 'vesanico_post_comment' || options.data.action === 'vesanico_delete_comment') {
            options.success({ success: true, data: { id: Date.now() } });
            return;
        }
        return originalAjax(options);
      };
    </script>

    <!-- Load the Plugin App -->
    <script type="text/babel" src="assets/js/vesanico-app.js"></script>
  <script type="module" src="/index.tsx"></script>
</body>
